<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#160b28"/><stop offset="100%" stop-color="#280b1a"/></linearGradient>
    <radialGradient id="gl" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#c084fc" stop-opacity=".2"/><stop offset="100%" stop-color="#c084fc" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <rect width="600" height="300" fill="url(#gl)"/>
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#c084fc" opacity=".06"/></pattern>
  <rect width="600" height="300" fill="url(#dots)"/>
  <!-- open book spine -->
  <rect x="292" y="90" width="16" height="130" rx="3" fill="#c084fc" opacity=".18"/>
  <!-- left page -->
  <path d="M292 94 Q220 98 190 110 L190 215 Q220 205 292 210 Z" fill="#c084fc" opacity=".08" stroke="#c084fc" stroke-width="1" stroke-opacity=".25"/>
  <!-- right page -->
  <path d="M308 94 Q380 98 410 110 L410 215 Q380 205 308 210 Z" fill="#c084fc" opacity=".08" stroke="#c084fc" stroke-width="1" stroke-opacity=".25"/>
  <!-- text lines left page -->
  <line x1="210" y1="128" x2="282" y2="126" stroke="#c084fc" stroke-width="1.5" opacity=".2"/>
  <line x1="210" y1="142" x2="282" y2="140" stroke="#c084fc" stroke-width="1.5" opacity=".17"/>
  <line x1="210" y1="156" x2="275" y2="154" stroke="#c084fc" stroke-width="1.5" opacity=".15"/>
  <line x1="210" y1="170" x2="282" y2="168" stroke="#c084fc" stroke-width="1.5" opacity=".13"/>
  <line x1="210" y1="184" x2="265" y2="182" stroke="#c084fc" stroke-width="1.5" opacity=".12"/>
  <!-- text lines right page -->
  <line x1="318" y1="128" x2="390" y2="126" stroke="#c084fc" stroke-width="1.5" opacity=".2"/>
  <line x1="318" y1="142" x2="390" y2="140" stroke="#c084fc" stroke-width="1.5" opacity=".17"/>
  <line x1="318" y1="156" x2="383" y2="154" stroke="#c084fc" stroke-width="1.5" opacity=".15"/>
  <line x1="318" y1="170" x2="390" y2="168" stroke="#c084fc" stroke-width="1.5" opacity=".13"/>
  <line x1="318" y1="184" x2="372" y2="182" stroke="#c084fc" stroke-width="1.5" opacity=".12"/>
  <!-- quill pen top right -->
  <g transform="translate(460,55) rotate(-35)">
    <line x1="0" y1="0" x2="0" y2="80" stroke="#c084fc" stroke-width="1.5" opacity=".35"/>
    <path d="M0,0 Q-18,-30 -8,-55 Q0,-35 8,-55 Q18,-30 0,0Z" fill="#c084fc" opacity=".2"/>
    <path d="M0,0 Q6,-15 0,-28 Q-6,-15 0,0Z" fill="#c084fc" opacity=".35"/>
  </g>
  <!-- sparkles -->
  <circle cx="150" cy="80" r="3" fill="#c084fc" opacity=".45"/>
  <circle cx="170" cy="60" r="2" fill="#c084fc" opacity=".3"/>
  <circle cx="135" cy="65" r="1.5" fill="#c084fc" opacity=".35"/>
  <circle cx="450" cy="210" r="2.5" fill="#c084fc" opacity=".4"/>
  <circle cx="470" cy="230" r="1.5" fill="#c084fc" opacity=".3"/>
  <!-- stack books behind -->
  <rect x="100" y="195" width="90" height="12" rx="3" fill="#c084fc" opacity=".1"/>
  <rect x="105" y="183" width="80" height="12" rx="3" fill="#c084fc" opacity=".08"/>
  <rect x="98" y="171" width="94" height="12" rx="3" fill="#c084fc" opacity=".06"/>
  <!-- crown glow -->
  <circle cx="300" cy="152" r="8" fill="#c084fc" opacity=".35"/>
  <circle cx="300" cy="152" r="18" fill="none" stroke="#c084fc" stroke-width="1" opacity=".15"/>
</svg>
