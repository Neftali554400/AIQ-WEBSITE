<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg1" cx="30%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#034f46" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0a0a08" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg2" cx="80%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#ffa946" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0a0a08" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#034f46" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0a0a08" stop-opacity="0"/>
    </radialGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a08"/>
  <rect width="1200" height="630" fill="url(#bg1)"/>
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="#0a0a08" opacity="0.03" filter="url(#noise)"/>

  <!-- Border frame -->
  <rect x="32" y="32" width="1136" height="566" rx="16" fill="none" stroke="rgba(3,79,70,0.4)" stroke-width="1.5"/>

  <!-- Corner ornaments -->
  <path d="M56 56 L56 90 M56 56 L90 56" stroke="#5ecfbb" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M1144 56 L1144 90 M1144 56 L1110 56" stroke="#5ecfbb" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M56 574 L56 540 M56 574 L90 574" stroke="#5ecfbb" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M1144 574 L1144 540 M1144 574 L1110 574" stroke="#5ecfbb" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- Logo -->
  <text x="600" y="152" font-family="Georgia, serif" font-size="44" font-weight="500" fill="rgba(255,255,235,0.4)" text-anchor="middle" letter-spacing="6">AIQ COURSES</text>

  <!-- Divider top -->
  <line x1="480" y1="175" x2="720" y2="175" stroke="rgba(3,79,70,0.5)" stroke-width="1"/>

  <!-- Main headline -->
  <text x="600" y="275" font-family="Georgia, serif" font-size="72" font-weight="500" fill="#ffffeb" text-anchor="middle" letter-spacing="-1.5">Create Videos with AI</text>
  <text x="600" y="360" font-family="Georgia, serif" font-size="64" font-weight="400" fill="rgba(255,255,235,0.7)" text-anchor="middle" font-style="italic" letter-spacing="-1">&amp; Start Earning</text>

  <!-- Subtext -->
  <text x="600" y="430" font-family="Arial, sans-serif" font-size="24" font-weight="400" fill="rgba(255,255,235,0.42)" text-anchor="middle" letter-spacing="0.5">No experience needed · Course launching soon</text>

  <!-- CTA pill -->
  <rect x="430" y="468" width="340" height="52" rx="26" fill="#034f46" opacity="0.9"/>
  <text x="600" y="500" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffeb" text-anchor="middle" letter-spacing="0.5">Get Early Access →</text>

  <!-- Domain -->
  <text x="600" y="582" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,235,0.22)" text-anchor="middle" letter-spacing="1">aiq-courses.com</text>
</svg>
