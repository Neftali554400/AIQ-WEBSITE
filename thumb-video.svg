<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0b1c32"/><stop offset="100%" stop-color="#06231a"/></linearGradient>
    <radialGradient id="gl" cx="50%" cy="48%" r="48%"><stop offset="0%" stop-color="#5ecfbb" stop-opacity=".22"/><stop offset="100%" stop-color="#5ecfbb" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <rect width="600" height="300" fill="url(#gl)"/>
  <!-- dot grid -->
  <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#5ecfbb" opacity=".07"/></pattern>
  <rect width="600" height="300" fill="url(#dots)"/>
  <!-- film strip top bar -->
  <rect width="600" height="22" fill="#000" opacity=".35"/>
  <rect y="278" width="600" height="22" fill="#000" opacity=".35"/>
  <!-- perforations top -->
  <rect x="8" y="5" width="22" height="12" rx="2" fill="#fff" opacity=".06"/><rect x="46" y="5" width="22" height="12" rx="2" fill="#fff" opacity=".06"/><rect x="84" y="5" width="22" height="12" rx="2" fill="#fff" opacity=".06"/><rect x="122" y="5" width="22" height="12" rx="2" fill="#fff" opacity=".06"/><rect x="160" y="5" width="22" height="12" rx="2" fill="#fff" opacity=".06"/><rect x="198" y="5" width="22" height="12" rx="2" fill="#fff" opacity=".06"/><rect x="236" y="5" width="22" height="12" rx="2" fill="#fff" opacity=".06"/><rect x="274" y="5" width="22" height="12" rx="2" fill="#fff" opacity=".06"/><rect x="312" y="5" width="22" height="12" rx="2" fill="#fff" opacity=".06"/><rect x="350" y="5" width="22" height="12" rx="2" fill="#fff" opacity=".06"/><rect x="388" y="5" width="22" height="12" rx="2" fill="#fff" opacity=".06"/><rect x="426" y="5" width="22" height="12" rx="2" fill="#fff" opacity=".06"/><rect x="464" y="5" width="22" height="12" rx="2" fill="#fff" opacity=".06"/><rect x="502" y="5" width="22" height="12" rx="2" fill="#fff" opacity=".06"/><rect x="540" y="5" width="22" height="12" rx="2" fill="#fff" opacity=".06"/>
  <!-- perforations bottom -->
  <rect x="8" y="283" width="22" height="12" rx="2" fill="#fff" opacity=".06"/><rect x="46" y="283" width="22" height="12" rx="2" fill="#fff" opacity=".06"/><rect x="84" y="283" width="22" height="12" rx="2" fill="#fff" opacity=".06"/><rect x="122" y="283" width="22" height="12" rx="2" fill="#fff" opacity=".06"/><rect x="160" y="283" width="22" height="12" rx="2" fill="#fff" opacity=".06"/><rect x="198" y="283" width="22" height="12" rx="2" fill="#fff" opacity=".06"/><rect x="236" y="283" width="22" height="12" rx="2" fill="#fff" opacity=".06"/><rect x="274" y="283" width="22" height="12" rx="2" fill="#fff" opacity=".06"/><rect x="312" y="283" width="22" height="12" rx="2" fill="#fff" opacity=".06"/><rect x="350" y="283" width="22" height="12" rx="2" fill="#fff" opacity=".06"/><rect x="388" y="283" width="22" height="12" rx="2" fill="#fff" opacity=".06"/><rect x="426" y="283" width="22" height="12" rx="2" fill="#fff" opacity=".06"/><rect x="464" y="283" width="22" height="12" rx="2" fill="#fff" opacity=".06"/><rect x="502" y="283" width="22" height="12" rx="2" fill="#fff" opacity=".06"/><rect x="540" y="283" width="22" height="12" rx="2" fill="#fff" opacity=".06"/>
  <!-- outer pulse ring -->
  <circle cx="300" cy="150" r="88" fill="none" stroke="#5ecfbb" stroke-width="1" opacity=".1"/>
  <circle cx="300" cy="150" r="66" fill="none" stroke="#5ecfbb" stroke-width="1" opacity=".16"/>
  <!-- play button bg -->
  <circle cx="300" cy="150" r="50" fill="#5ecfbb" opacity=".12"/>
  <circle cx="300" cy="150" r="50" fill="none" stroke="#5ecfbb" stroke-width="2" opacity=".55"/>
  <!-- play triangle -->
  <polygon points="288,128 288,172 330,150" fill="#5ecfbb" opacity=".9"/>
  <!-- camera body bottom-left -->
  <rect x="44" y="185" width="72" height="50" rx="8" fill="none" stroke="#5ecfbb" stroke-width="1.4" opacity=".18"/>
  <circle cx="80" cy="210" r="14" fill="none" stroke="#5ecfbb" stroke-width="1.4" opacity=".18"/>
  <rect x="56" y="178" width="20" height="8" rx="2" fill="#5ecfbb" opacity=".14"/>
  <polygon points="116,200 136,192 136,228 116,220" fill="#5ecfbb" opacity=".14"/>
  <!-- timeline scrubber bottom-right -->
  <rect x="400" y="196" width="160" height="3" rx="1.5" fill="#5ecfbb" opacity=".1"/>
  <rect x="400" y="210" width="100" height="8" rx="2" fill="#5ecfbb" opacity=".12"/>
  <rect x="400" y="225" width="130" height="8" rx="2" fill="#5ecfbb" opacity=".08"/>
  <rect x="400" y="240" width="80" height="8" rx="2" fill="#5ecfbb" opacity=".07"/>
  <circle cx="460" cy="199" r="4" fill="#5ecfbb" opacity=".45"/>
</svg>
