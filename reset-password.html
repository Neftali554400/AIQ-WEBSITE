<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — AIQ</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--lumen:#ffffeb;--fathom:#034f46;--fathom-lt:#056b5e;--glow:#ffa946;--bg:#0a0a08}
    body{font-family:'Figtree',Arial,sans-serif;-webkit-font-smoothing:antialiased;background:var(--bg);color:var(--lumen);min-height:100vh;display:flex;flex-direction:column}
    body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:128px}
    nav{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 2.5rem;border-bottom:1px solid rgba(255,255,235,.06)}
    .nav-logo{font-family:'EB Garamond',Georgia,serif;font-size:1.45rem;font-weight:500;color:var(--lumen);text-decoration:none;letter-spacing:-.01em}
    .nav-back{display:inline-flex;align-items:center;gap:.4rem;font-size:.85rem;color:rgba(255,255,235,.5);text-decoration:none;transition:color .15s ease}
    .nav-back:hover{color:var(--lumen)}
    .page{flex:1;display:flex;align-items:center;justify-content:center;padding:3rem 1.5rem;position:relative;overflow:hidden}
    .glow-1{position:absolute;inset:0;background:radial-gradient(ellipse 60% 55% at 50% 0%,rgba(3,79,70,.35) 0%,transparent 65%);pointer-events:none}
    .card{position:relative;z-index:1;width:100%;max-width:420px;background:rgba(255,255,235,.04);border:1px solid rgba(255,255,235,.1);border-radius:2rem;padding:2.75rem 2.25rem;box-shadow:0 40px 80px rgba(0,0,0,.5)}
    .card-eyebrow{display:inline-flex;align-items:center;gap:.4rem;background:rgba(255,169,70,.1);border:1px solid rgba(255,169,70,.28);border-radius:9999px;padding:.28rem .8rem;font-size:.72rem;font-weight:600;color:var(--glow);letter-spacing:.04em;text-transform:uppercase;margin-bottom:1.5rem}
    .eyebrow-dot{width:5px;height:5px;border-radius:50%;background:var(--glow);animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .card-title{font-family:'EB Garamond',Georgia,serif;font-size:2.2rem;font-weight:500;line-height:1.1;letter-spacing:-.02em;margin-bottom:.6rem}
    .card-title em{font-style:italic}
    .card-sub{font-size:.9rem;color:rgba(255,255,235,.48);line-height:1.65;margin-bottom:2rem}
    .field-group{display:flex;flex-direction:column;gap:.3rem;margin-bottom:.75rem}
    .field-error{font-size:.78rem;color:#ff6b6b;min-height:1rem;padding-left:.2rem}
    .password-wrap{position:relative}
    .password-wrap input{padding-right:2.8rem}
    .pwd-toggle{position:absolute;right:.8rem;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,235,.35);cursor:pointer;padding:.2rem;display:flex;align-items:center;transition:color .15s ease}
    .pwd-toggle:hover{color:rgba(255,255,235,.7)}
    .input{width:100%;background:rgba(255,255,235,.06);border:1px solid rgba(255,255,235,.12);border-radius:.75rem;padding:.85rem 1.1rem;font-family:'Figtree',sans-serif;font-size:.9rem;color:var(--lumen);outline:none;transition:border-color .2s ease,background .2s ease}
    .input::placeholder{color:rgba(255,255,235,.3)}
    .input:focus{border-color:rgba(255,255,235,.3);background:rgba(255,255,235,.08)}
    .strength-bar{height:3px;border-radius:9999px;background:rgba(255,255,235,.08);margin-top:.4rem;overflow:hidden}
    .strength-fill{height:100%;width:0;border-radius:9999px;transition:width .3s ease,background .3s ease}
    .strength-label{font-size:.72rem;color:rgba(255,255,235,.4);margin-top:.2rem}
    .btn{width:100%;background:var(--fathom);color:var(--lumen);border:none;border-radius:.75rem;padding:.85rem 1.25rem;font-family:'Figtree',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .2s ease,transform .15s ease;margin-top:.25rem}
    .btn:hover{background:var(--fathom-lt);transform:translateY(-1px)}
    .btn:active{transform:translateY(0)}
    .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .banner{display:none;align-items:flex-start;gap:.6rem;border-radius:.75rem;padding:.75rem 1rem;font-size:.82rem;line-height:1.55;margin-bottom:.75rem}
    .banner.visible{display:flex}
    .banner.error{background:rgba(255,80,80,.07);border:1px solid rgba(255,80,80,.22);color:rgba(255,120,120,.9)}
    .banner.success{background:rgba(0,180,100,.07);border:1px solid rgba(0,180,100,.22);color:rgba(80,210,140,.9)}
    .success-state{display:none;text-align:center;padding:1rem 0}
    .success-state.visible{display:block}
    .success-icon{font-size:3rem;margin-bottom:1rem}
    .success-title{font-family:'EB Garamond',Georgia,serif;font-size:1.6rem;font-weight:500;margin-bottom:.5rem}
    .success-sub{font-size:.9rem;color:rgba(255,255,235,.5);line-height:1.6;margin-bottom:1.5rem}
    .success-link{display:inline-flex;align-items:center;gap:.4rem;background:var(--fathom);color:var(--lumen);border-radius:9999px;padding:.65rem 1.5rem;font-size:.88rem;font-weight:600;text-decoration:none;transition:background .2s ease}
    .success-link:hover{background:var(--fathom-lt)}
    footer{padding:1.5rem 2.5rem;border-top:1px solid rgba(255,255,235,.06);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem}
    footer span{font-size:.78rem;color:rgba(255,255,235,.2)}
    footer a{font-size:.78rem;color:rgba(255,255,235,.35);text-decoration:none}
    footer a:hover{color:rgba(255,255,235,.7)}
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">AIQ</a>
    <a href="signup.html" class="nav-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      Back to sign in
    </a>
  </nav>

  <main class="page">
    <div class="glow-1" aria-hidden="true"></div>

    <div class="card">
      <!-- Reset form -->
      <div id="reset-form">
        <div class="card-eyebrow"><span class="eyebrow-dot" aria-hidden="true"></span>Reset password</div>
        <h1 class="card-title">New <em>password</em></h1>
        <p class="card-sub">Choose a strong password for your AIQ account.</p>

        <div class="banner" id="banner" role="alert"></div>

        <form onsubmit="handleReset(event)" novalidate>
          <div class="field-group">
            <div class="password-wrap">
              <input class="input" type="password" id="password" placeholder="New password (min. 8 characters)" autocomplete="new-password" aria-label="New password" oninput="checkStrength(this.value)" />
              <button type="button" class="pwd-toggle" onclick="togglePwd('password',this)" aria-label="Show password">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
              </button>
            </div>
            <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
            <span class="strength-label" id="strength-label"></span>
            <span class="field-error" id="password-error"></span>
          </div>
          <div class="field-group">
            <div class="password-wrap">
              <input class="input" type="password" id="confirm" placeholder="Confirm new password" autocomplete="new-password" aria-label="Confirm password" />
              <button type="button" class="pwd-toggle" onclick="togglePwd('confirm',this)" aria-label="Show confirm password">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
              </button>
            </div>
            <span class="field-error" id="confirm-error"></span>
          </div>
          <button class="btn" type="submit" id="submit-btn">Set new password</button>
        </form>
      </div>

      <!-- Success state -->
      <div class="success-state" id="success-state">
        <div class="success-icon">✅</div>
        <div class="success-title">Password updated</div>
        <p class="success-sub">Your password has been changed successfully.</p>
        <a href="signup.html" class="success-link">Sign in now</a>
      </div>
    </div>
  </main>

  <footer>
    <span>© 2026 AIQ</span>
    <div style="display:flex;gap:1.5rem">
      <a href="privacy.html">Privacy</a>
      <a href="terms.html">Terms</a>
    </div>
  </footer>

  <script>
    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) {
      document.getElementById('banner').textContent = 'Invalid reset link. Please request a new one.';
      document.getElementById('banner').className = 'banner visible error';
      document.querySelector('form').style.display = 'none';
    }

    function togglePwd(id, btn) {
      const el = document.getElementById(id);
      const isText = el.type === 'text';
      el.type = isText ? 'password' : 'text';
      btn.innerHTML = isText
        ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>'
        : '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2.81 3.81L1.39 5.22 8 11.83V12c0 2.21 1.79 4 4 4 .25 0 .49-.02.73-.07l1.23 1.23C13.32 17.69 12.67 17.83 12 17.83c-3.31 0-6.27-2.08-7.71-5.12A12.26 12.26 0 0 1 6.5 9.56L5.07 8.13A14.26 14.26 0 0 0 2.5 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.31 4.38-.87l1.9 1.9 1.41-1.41L2.81 3.81zM12 6.5c3.31 0 6.27 2.08 7.71 5.12a12.36 12.36 0 0 1-2.16 3.06l1.43 1.43A14.26 14.26 0 0 0 21.5 12c-1.73-4.39-6-7.5-11-7.5-1.55 0-3.03.31-4.38.87L7.72 6.97A9.68 9.68 0 0 1 12 6.5zM12 8c.25 0 .49.02.73.07L8.07 12.73A4.02 4.02 0 0 1 8 12c0-2.21 1.79-4 4-4z"/></svg>';
    }

    function checkStrength(val) {
      const fill = document.getElementById('strength-fill');
      const label = document.getElementById('strength-label');
      if (!val) { fill.style.width = '0'; label.textContent = ''; return; }
      let s = 0;
      if (val.length >= 8) s++; if (val.length >= 12) s++;
      if (/[A-Z]/.test(val)) s++; if (/[0-9]/.test(val)) s++; if (/[^A-Za-z0-9]/.test(val)) s++;
      const lvl = [{pct:'20%',color:'#ff4444',text:'Very weak'},{pct:'40%',color:'#ff8800',text:'Weak'},{pct:'60%',color:'#ffcc00',text:'Fair'},{pct:'80%',color:'#88cc00',text:'Good'},{pct:'100%',color:'#00cc66',text:'Strong'}][Math.min(s,4)];
      fill.style.width = lvl.pct; fill.style.background = lvl.color;
      label.textContent = lvl.text; label.style.color = lvl.color;
    }

    async function handleReset(e) {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      document.getElementById('password-error').textContent = '';
      document.getElementById('confirm-error').textContent  = '';
      document.getElementById('banner').className = 'banner';

      if (password.length < 8) { document.getElementById('password-error').textContent = 'Password must be at least 8 characters.'; return; }
      if (password !== confirm) { document.getElementById('confirm-error').textContent = 'Passwords do not match.'; return; }

      const btn = document.getElementById('submit-btn');
      btn.textContent = 'Updating…'; btn.disabled = true;

      const res  = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password }),
      });
      const data = await res.json();

      btn.textContent = 'Set new password'; btn.disabled = false;

      if (!res.ok) {
        document.getElementById('banner').textContent = data.error;
        document.getElementById('banner').className = 'banner visible error';
        return;
      }

      document.getElementById('reset-form').style.display = 'none';
      document.getElementById('success-state').classList.add('visible');
    }
  </script>
</body>
</html>
