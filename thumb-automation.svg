<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#090d1a"/><stop offset="100%" stop-color="#0d0a22"/></linearGradient>
    <radialGradient id="gl" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#60a5fa" stop-opacity=".2"/><stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <rect width="600" height="300" fill="url(#gl)"/>
  <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#60a5fa" opacity=".07"/></pattern>
  <rect width="600" height="300" fill="url(#dots)"/>
  <!-- flow nodes -->
  <rect x="80" y="130" width="70" height="40" rx="8" fill="#60a5fa" opacity=".12" stroke="#60a5fa" stroke-width="1.5" stroke-opacity=".35"/>
  <rect x="85" y="143" width="60" height="14" rx="3" fill="#60a5fa" opacity=".2"/>
  <rect x="265" y="110" width="70" height="40" rx="8" fill="#60a5fa" opacity=".12" stroke="#60a5fa" stroke-width="1.5" stroke-opacity=".35"/>
  <rect x="265" y="150" width="70" height="40" rx="8" fill="#60a5fa" opacity=".12" stroke="#60a5fa" stroke-width="1.5" stroke-opacity=".35"/>
  <rect x="450" y="130" width="70" height="40" rx="8" fill="#60a5fa" opacity=".12" stroke="#60a5fa" stroke-width="1.5" stroke-opacity=".35"/>
  <!-- arrows between nodes -->
  <line x1="150" y1="150" x2="262" y2="132" stroke="#60a5fa" stroke-width="1.5" opacity=".35" stroke-dasharray="5,4"/>
  <line x1="150" y1="150" x2="262" y2="168" stroke="#60a5fa" stroke-width="1.5" opacity=".35" stroke-dasharray="5,4"/>
  <line x1="338" y1="130" x2="447" y2="148" stroke="#60a5fa" stroke-width="1.5" opacity=".35" stroke-dasharray="5,4"/>
  <line x1="338" y1="170" x2="447" y2="152" stroke="#60a5fa" stroke-width="1.5" opacity=".35" stroke-dasharray="5,4"/>
  <!-- arrowheads -->
  <polygon points="262,132 252,127 252,137" fill="#60a5fa" opacity=".5"/>
  <polygon points="262,168 252,163 252,173" fill="#60a5fa" opacity=".5"/>
  <polygon points="447,148 437,143 437,153" fill="#60a5fa" opacity=".5"/>
  <polygon points="447,152 437,147 437,157" fill="#60a5fa" opacity=".5"/>
  <!-- node labels -->
  <rect x="90" y="147" width="50" height="6" rx="2" fill="#60a5fa" opacity=".3"/>
  <rect x="272" y="120" width="56" height="5" rx="2" fill="#60a5fa" opacity=".25"/>
  <rect x="272" y="160" width="56" height="5" rx="2" fill="#60a5fa" opacity=".25"/>
  <rect x="458" y="144" width="50" height="6" rx="2" fill="#60a5fa" opacity=".3"/>
  <!-- lightning bolt centre -->
  <polygon points="310,60 295,145 308,145 293,240 318,135 304,135" fill="#fbbf24" opacity=".35"/>
  <!-- gear icon bottom left -->
  <circle cx="110" cy="230" r="20" fill="none" stroke="#60a5fa" stroke-width="2" opacity=".2"/>
  <circle cx="110" cy="230" r="10" fill="none" stroke="#60a5fa" stroke-width="2" opacity=".25"/>
  <rect x="107" y="206" width="6" height="8" rx="2" fill="#60a5fa" opacity=".2"/>
  <rect x="107" y="246" width="6" height="8" rx="2" fill="#60a5fa" opacity=".2"/>
  <rect x="86" y="227" width="8" height="6" rx="2" fill="#60a5fa" opacity=".2"/>
  <rect x="126" y="227" width="8" height="6" rx="2" fill="#60a5fa" opacity=".2"/>
  <!-- gear icon right -->
  <circle cx="490" cy="75" r="18" fill="none" stroke="#60a5fa" stroke-width="2" opacity=".2"/>
  <circle cx="490" cy="75" r="9" fill="none" stroke="#60a5fa" stroke-width="2" opacity=".25"/>
  <rect x="487" y="53" width="6" height="7" rx="2" fill="#60a5fa" opacity=".2"/>
  <rect x="487" y="89" width="6" height="7" rx="2" fill="#60a5fa" opacity=".2"/>
  <rect x="468" y="72" width="7" height="6" rx="2" fill="#60a5fa" opacity=".2"/>
  <rect x="505" y="72" width="7" height="6" rx="2" fill="#60a5fa" opacity=".2"/>
</svg>
