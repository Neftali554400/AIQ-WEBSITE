<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — AIQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--lumen:#ffffeb;--fathom:#034f46;--fathom-lt:#056b5e;--glow:#ffa946;--bg:#0a0a08;--border:rgba(255,255,235,0.09)}
    body{font-family:'Figtree',Arial,sans-serif;-webkit-font-smoothing:antialiased;background:var(--bg);color:var(--lumen);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
    body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:128px}
    .glow{position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(3,79,70,.3) 0%,transparent 65%);pointer-events:none}
    .card{position:relative;z-index:1;width:100%;max-width:400px;background:rgba(255,255,235,.04);border:1px solid rgba(255,255,235,.1);border-radius:2rem;padding:2.5rem 2rem;box-shadow:0 40px 80px rgba(0,0,0,.5)}
    .admin-badge{display:inline-flex;align-items:center;gap:.4rem;background:rgba(255,169,70,.1);border:1px solid rgba(255,169,70,.28);border-radius:9999px;padding:.28rem .8rem;font-size:.7rem;font-weight:700;color:var(--glow);letter-spacing:.06em;text-transform:uppercase;margin-bottom:1.5rem}
    .lock-icon{font-size:1.1rem}
    h1{font-family:'EB Garamond',Georgia,serif;font-size:2rem;font-weight:500;color:var(--lumen);margin-bottom:.5rem;letter-spacing:-.02em}
    .sub{font-size:.85rem;color:rgba(255,255,235,.4);line-height:1.6;margin-bottom:2rem}
    .btn-google{width:100%;display:flex;align-items:center;justify-content:center;gap:.75rem;padding:.9rem 1.25rem;border-radius:.875rem;font-family:'Figtree',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;border:none;background:#fff;color:#1f1f1f;transition:background .15s ease,transform .15s ease}
    .btn-google:hover{background:#f0f0f0;transform:translateY(-1px)}
    .btn-google:active{transform:translateY(0)}
    .btn-icon{width:22px;height:22px;flex-shrink:0}
    .error{display:none;margin-top:1.25rem;padding:.85rem 1rem;background:rgba(255,60,60,.08);border:1px solid rgba(255,60,60,.2);border-radius:.75rem;font-size:.82rem;color:rgba(255,100,100,.85);line-height:1.55;text-align:center}
    .error.visible{display:block}
    .back{display:inline-flex;align-items:center;gap:.35rem;margin-top:2rem;font-size:.78rem;color:rgba(255,255,235,.3);text-decoration:none;transition:color .15s ease}
    .back:hover{color:rgba(255,255,235,.65)}
    .spinner{display:none;width:22px;height:22px;border:2px solid rgba(255,255,235,.15);border-top-color:var(--fathom-lt);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="card">
    <div class="admin-badge"><span class="lock-icon">🔐</span> Admin Portal</div>
    <h1>Admin Sign In</h1>
    <p class="sub">Only authorised AIQ administrators can access this area. Sign in with your Google account to continue.</p>

    <button class="btn-google" onclick="handleAdminGoogleClick()" id="google-btn">
      <svg class="btn-icon" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>
    <div class="spinner" id="spinner"></div>

    <div class="error" id="error-msg">
      This Google account is not authorised as an AIQ administrator. Please contact the super admin if you believe this is an error.
    </div>
  </div>
  <a href="index.html" class="back">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/></svg>
    Back to AIQ
  </a>

  <script>
    const GOOGLE_CLIENT_ID = '846815529793-t4f02mai8albvjr1tldaaukhffsdpta1.apps.googleusercontent.com';
    const SUPER_ADMIN_EMAIL = 'michael.neftali@gmail.com';

    function getAdmins() {
      try { return JSON.parse(localStorage.getItem('aiq_admins')) || []; } catch(e) { return []; }
    }

    function isAdminEmail(email) {
      if (!email) return false;
      if (email.toLowerCase() === SUPER_ADMIN_EMAIL.toLowerCase()) return true;
      return getAdmins().some(a => a.email.toLowerCase() === email.toLowerCase());
    }

    function handleAdminGoogleClick() {
      const client = google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID,
        scope: 'openid profile email',
        callback: handleAdminGoogleResponse,
      });
      client.requestAccessToken({ prompt: 'select_account' });
      document.getElementById('google-btn').style.display = 'none';
      document.getElementById('spinner').style.display = 'block';
    }

    function handleAdminGoogleResponse(response) {
      if (response.error) {
        document.getElementById('google-btn').style.display = 'flex';
        document.getElementById('spinner').style.display = 'none';
        return;
      }
      fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
        headers: { Authorization: 'Bearer ' + response.access_token }
      })
      .then(r => r.json())
      .then(profile => {
        if (!isAdminEmail(profile.email)) {
          document.getElementById('error-msg').classList.add('visible');
          document.getElementById('google-btn').style.display = 'flex';
          document.getElementById('spinner').style.display = 'none';
          return;
        }
        const isSuperAdmin = profile.email.toLowerCase() === SUPER_ADMIN_EMAIL.toLowerCase();
        const adminSession = {
          name: profile.name,
          email: profile.email,
          picture: profile.picture,
          role: isSuperAdmin ? 'super_admin' : 'sub_admin',
          loginTime: new Date().toISOString()
        };
        localStorage.setItem('aiq_admin_session', JSON.stringify(adminSession));
        window.location.href = 'admin.html';
      })
      .catch(() => {
        document.getElementById('google-btn').style.display = 'flex';
        document.getElementById('spinner').style.display = 'none';
      });
    }

    // If already logged in as admin, go straight to dashboard
    (function() {
      try {
        const session = JSON.parse(localStorage.getItem('aiq_admin_session'));
        if (session && session.email) window.location.href = 'admin.html';
      } catch(e) {}
    })();
  </script>
</body>
</html>
