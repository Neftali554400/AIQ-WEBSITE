<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f130e"/><stop offset="100%" stop-color="#181208"/></linearGradient>
    <radialGradient id="gl" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#34d399" stop-opacity=".18"/><stop offset="100%" stop-color="#34d399" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <rect width="600" height="300" fill="url(#gl)"/>
  <pattern id="grid" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M30,0 L0,0 L0,30" fill="none" stroke="#34d399" stroke-width=".3" opacity=".1"/></pattern>
  <rect width="600" height="300" fill="url(#grid)"/>
  <!-- browser window -->
  <rect x="140" y="75" width="320" height="185" rx="10" fill="#34d399" opacity=".05" stroke="#34d399" stroke-width="1.5" stroke-opacity=".3"/>
  <!-- browser chrome -->
  <rect x="140" y="75" width="320" height="28" rx="10" fill="#34d399" opacity=".1"/>
  <rect x="140" y="91" width="320" height="12" fill="#34d399" opacity=".06"/>
  <!-- browser dots -->
  <circle cx="158" cy="89" r="4" fill="#f87171" opacity=".55"/>
  <circle cx="174" cy="89" r="4" fill="#fbbf24" opacity=".55"/>
  <circle cx="190" cy="89" r="4" fill="#34d399" opacity=".55"/>
  <!-- address bar -->
  <rect x="210" y="82" width="160" height="14" rx="4" fill="#34d399" opacity=".1" stroke="#34d399" stroke-width=".8" stroke-opacity=".2"/>
  <rect x="216" y="86" width="80" height="6" rx="2" fill="#34d399" opacity=".2"/>
  <!-- page content lines -->
  <!-- hero block -->
  <rect x="158" y="120" width="284" height="30" rx="4" fill="#34d399" opacity=".08"/>
  <rect x="180" y="130" width="120" height="10" rx="2" fill="#34d399" opacity=".2"/>
  <rect x="180" y="144" width="80" height="6" rx="2" fill="#34d399" opacity=".12"/>
  <!-- nav items -->
  <rect x="320" y="132" width="40" height="6" rx="2" fill="#34d399" opacity=".15"/>
  <rect x="368" y="132" width="40" height="6" rx="2" fill="#34d399" opacity=".12"/>
  <rect x="416" y="130" width="18" height="10" rx="3" fill="#34d399" opacity=".25"/>
  <!-- content cards row -->
  <rect x="158" y="162" width="86" height="68" rx="5" fill="#34d399" opacity=".07" stroke="#34d399" stroke-width="1" stroke-opacity=".18"/>
  <rect x="257" y="162" width="86" height="68" rx="5" fill="#34d399" opacity=".07" stroke="#34d399" stroke-width="1" stroke-opacity=".18"/>
  <rect x="356" y="162" width="86" height="68" rx="5" fill="#34d399" opacity=".07" stroke="#34d399" stroke-width="1" stroke-opacity=".18"/>
  <!-- card content -->
  <rect x="168" y="196" width="66" height="5" rx="2" fill="#34d399" opacity=".2"/>
  <rect x="168" y="206" width="50" height="4" rx="2" fill="#34d399" opacity=".12"/>
  <rect x="267" y="196" width="66" height="5" rx="2" fill="#34d399" opacity=".2"/>
  <rect x="367" y="196" width="66" height="5" rx="2" fill="#34d399" opacity=".2"/>
  <!-- code bracket left -->
  <text x="62" y="170" font-family="monospace" font-size="52" fill="#34d399" opacity=".18" font-weight="bold">&lt;/&gt;</text>
  <!-- cursor -->
  <path d="M498,210 L498,240 L506,232 L512,248 L516,246 L510,230 L520,230 Z" fill="#34d399" opacity=".45"/>
  <!-- sparkles -->
  <circle cx="110" cy="85" r="2" fill="#34d399" opacity=".45"/>
  <circle cx="95" cy="68" r="1.5" fill="#34d399" opacity=".35"/>
  <circle cx="125" cy="65" r="1" fill="#34d399" opacity=".3"/>
</svg>
