<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#091a09"/><stop offset="100%" stop-color="#0f1f0a"/></linearGradient>
    <radialGradient id="gl" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#4ade80" stop-opacity=".2"/><stop offset="100%" stop-color="#4ade80" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <rect width="600" height="300" fill="url(#gl)"/>
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#4ade80" opacity=".06"/></pattern>
  <rect width="600" height="300" fill="url(#dots)"/>
  <!-- equalizer bars centre -->
  <rect x="192" y="110" width="22" height="80" rx="4" fill="#4ade80" opacity=".55"/>
  <rect x="224" y="80" width="22" height="110" rx="4" fill="#4ade80" opacity=".65"/>
  <rect x="256" y="100" width="22" height="90" rx="4" fill="#4ade80" opacity=".6"/>
  <rect x="288" y="60" width="22" height="130" rx="4" fill="#4ade80" opacity=".75"/>
  <rect x="320" y="90" width="22" height="100" rx="4" fill="#4ade80" opacity=".62"/>
  <rect x="352" y="115" width="22" height="75" rx="4" fill="#4ade80" opacity=".5"/>
  <rect x="384" y="75" width="22" height="115" rx="4" fill="#4ade80" opacity=".58"/>
  <!-- bar reflection -->
  <rect x="192" y="198" width="22" height="30" rx="4" fill="#4ade80" opacity=".12"/>
  <rect x="224" y="198" width="22" height="40" rx="4" fill="#4ade80" opacity=".15"/>
  <rect x="256" y="198" width="22" height="32" rx="4" fill="#4ade80" opacity=".13"/>
  <rect x="288" y="198" width="22" height="50" rx="4" fill="#4ade80" opacity=".18"/>
  <rect x="320" y="198" width="22" height="36" rx="4" fill="#4ade80" opacity=".14"/>
  <rect x="352" y="198" width="22" height="26" rx="4" fill="#4ade80" opacity=".11"/>
  <rect x="384" y="198" width="22" height="42" rx="4" fill="#4ade80" opacity=".13"/>
  <!-- baseline -->
  <rect x="160" y="196" width="280" height="2" rx="1" fill="#4ade80" opacity=".15"/>
  <!-- musical note left -->
  <g opacity=".3">
    <circle cx="110" cy="155" r="12" fill="#4ade80"/>
    <rect x="122" y="115" width="5" height="42" fill="#4ade80" rx="2"/>
    <rect x="122" y="113" width="28" height="5" fill="#4ade80" rx="2"/>
  </g>
  <!-- musical note right -->
  <g opacity=".25">
    <circle cx="488" cy="160" r="10" fill="#4ade80"/>
    <rect x="498" y="123" width="4" height="38" fill="#4ade80" rx="2"/>
    <circle cx="514" cy="155" r="10" fill="#4ade80"/>
    <rect x="524" y="118" width="4" height="38" fill="#4ade80" rx="2"/>
    <rect x="498" y="118" width="30" height="4" fill="#4ade80" rx="2"/>
  </g>
  <!-- pulse rings -->
  <circle cx="300" cy="150" r="105" fill="none" stroke="#4ade80" stroke-width="1" opacity=".06"/>
  <circle cx="300" cy="150" r="135" fill="none" stroke="#4ade80" stroke-width="1" opacity=".04"/>
</svg>
