<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0a0d1a"/><stop offset="100%" stop-color="#120a24"/></linearGradient>
    <radialGradient id="gl" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#818cf8" stop-opacity=".2"/><stop offset="100%" stop-color="#818cf8" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <rect width="600" height="300" fill="url(#gl)"/>
  <!-- pixel grid -->
  <pattern id="pg" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse"><rect width="16" height="16" fill="none" stroke="#818cf8" stroke-width=".3" opacity=".08"/></pattern>
  <rect width="600" height="300" fill="url(#pg)"/>
  <!-- controller body -->
  <path d="M210,120 Q200,110 190,120 L175,175 Q172,192 190,200 L235,205 Q248,215 270,200 L330,200 Q352,215 365,205 L410,200 Q428,192 425,175 L410,120 Q400,110 390,120 Z" fill="#818cf8" opacity=".1" stroke="#818cf8" stroke-width="1.5" stroke-opacity=".35"/>
  <!-- left grip -->
  <ellipse cx="205" cy="190" rx="28" ry="22" fill="#818cf8" opacity=".08" stroke="#818cf8" stroke-width="1.2" stroke-opacity=".25"/>
  <!-- right grip -->
  <ellipse cx="395" cy="190" rx="28" ry="22" fill="#818cf8" opacity=".08" stroke="#818cf8" stroke-width="1.2" stroke-opacity=".25"/>
  <!-- d-pad left -->
  <rect x="218" y="148" width="12" height="36" rx="2" fill="#818cf8" opacity=".35"/>
  <rect x="206" y="160" width="36" height="12" rx="2" fill="#818cf8" opacity=".35"/>
  <!-- ABXY buttons right -->
  <circle cx="368" cy="152" r="9" fill="none" stroke="#f472b6" stroke-width="1.8" opacity=".55"/>
  <circle cx="385" cy="165" r="9" fill="none" stroke="#818cf8" stroke-width="1.8" opacity=".55"/>
  <circle cx="351" cy="165" r="9" fill="none" stroke="#4ade80" stroke-width="1.8" opacity=".55"/>
  <circle cx="368" cy="178" r="9" fill="none" stroke="#fbbf24" stroke-width="1.8" opacity=".55"/>
  <!-- centre buttons -->
  <rect x="282" y="155" width="16" height="10" rx="3" fill="#818cf8" opacity=".3"/>
  <rect x="302" y="155" width="16" height="10" rx="3" fill="#818cf8" opacity=".3"/>
  <!-- joysticks -->
  <circle cx="245" cy="178" r="14" fill="none" stroke="#818cf8" stroke-width="1.5" opacity=".3"/>
  <circle cx="245" cy="178" r="7" fill="#818cf8" opacity=".35"/>
  <circle cx="355" cy="178" r="14" fill="none" stroke="#818cf8" stroke-width="1.5" opacity=".3"/>
  <circle cx="355" cy="178" r="7" fill="#818cf8" opacity=".35"/>
  <!-- stars -->
  <circle cx="110" cy="75" r="2.5" fill="#818cf8" opacity=".55"/>
  <circle cx="140" cy="55" r="1.5" fill="#f472b6" opacity=".5"/>
  <circle cx="88" cy="55" r="2" fill="#818cf8" opacity=".4"/>
  <circle cx="490" cy="80" r="2" fill="#818cf8" opacity=".5"/>
  <circle cx="520" cy="58" r="2.5" fill="#f472b6" opacity=".45"/>
  <circle cx="505" cy="98" r="1.5" fill="#818cf8" opacity=".4"/>
  <circle cx="80" cy="220" r="2" fill="#818cf8" opacity=".35"/>
  <circle cx="515" cy="225" r="2" fill="#818cf8" opacity=".35"/>
  <!-- pixel coin top right -->
  <rect x="460" y="85" width="28" height="28" rx="4" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity=".35"/>
  <text x="474" y="104" font-family="monospace" font-size="14" fill="#fbbf24" opacity=".4" text-anchor="middle">$</text>
  <!-- score lines top left -->
  <rect x="80" y="90" width="50" height="6" rx="2" fill="#818cf8" opacity=".15"/>
  <rect x="80" y="102" width="36" height="6" rx="2" fill="#818cf8" opacity=".1"/>
</svg>
