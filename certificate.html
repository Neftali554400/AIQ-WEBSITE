<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificate of Completion — AIQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--lumen:#ffffeb;--fathom:#034f46;--fathom-lt:#056b5e;--glow:#ffa946;--bg:#0a0a08}
    body{font-family:'Figtree',Arial,sans-serif;-webkit-font-smoothing:antialiased;background:var(--bg);color:var(--lumen);min-height:100vh;display:flex;flex-direction:column}
    body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:128px}

    nav{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 2.5rem;border-bottom:1px solid rgba(255,255,235,0.06)}
    .nav-logo{font-family:'EB Garamond',Georgia,serif;font-size:1.45rem;font-weight:500;color:var(--lumen);text-decoration:none;letter-spacing:-0.01em}
    .nav-actions{display:flex;gap:.75rem}
    .btn-download{display:inline-flex;align-items:center;gap:.45rem;background:var(--fathom);color:var(--lumen);border:none;border-radius:9999px;padding:.55rem 1.25rem;font-family:'Figtree',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;text-decoration:none;transition:background .2s ease}
    .btn-download:hover{background:var(--fathom-lt)}
    .btn-back{display:inline-flex;align-items:center;gap:.4rem;background:none;color:rgba(255,255,235,.45);border:1px solid rgba(255,255,235,.12);border-radius:9999px;padding:.55rem 1.25rem;font-family:'Figtree',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;text-decoration:none;transition:color .15s ease,border-color .15s ease}
    .btn-back:hover{color:var(--lumen);border-color:rgba(255,255,235,.3)}

    .page{flex:1;display:flex;align-items:center;justify-content:center;padding:3rem 1.5rem}

    /* CERTIFICATE */
    .cert-wrap{position:relative;width:100%;max-width:820px}
    .cert{background:linear-gradient(145deg,#0d1a18 0%,#0a0a08 50%,#0d1a18 100%);border:1px solid rgba(3,79,70,.4);border-radius:1.5rem;padding:4rem 4.5rem;text-align:center;position:relative;overflow:hidden;box-shadow:0 0 0 6px rgba(3,79,70,.08),0 40px 80px rgba(0,0,0,.6)}
    .cert::before{content:'';position:absolute;inset:12px;border:1px solid rgba(3,79,70,.2);border-radius:1.1rem;pointer-events:none}
    .cert-glow{position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(3,79,70,.18) 0%,transparent 60%);pointer-events:none}
    .cert-corner{position:absolute;width:60px;height:60px;opacity:.25}
    .cert-corner svg{width:100%;height:100%}
    .cert-corner.tl{top:24px;left:24px}
    .cert-corner.tr{top:24px;right:24px;transform:scaleX(-1)}
    .cert-corner.bl{bottom:24px;left:24px;transform:scaleY(-1)}
    .cert-corner.br{bottom:24px;right:24px;transform:scale(-1)}

    .cert-eyebrow{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.18em;color:rgba(3,79,70,.9);margin-bottom:1.75rem}
    .cert-logo{font-family:'EB Garamond',Georgia,serif;font-size:2.2rem;font-weight:500;color:var(--lumen);letter-spacing:-.02em;margin-bottom:.25rem}
    .cert-presents{font-size:.8rem;color:rgba(255,255,235,.35);margin-bottom:2rem;letter-spacing:.04em}

    .cert-title{font-family:'EB Garamond',Georgia,serif;font-size:1rem;font-weight:400;text-transform:uppercase;letter-spacing:.16em;color:rgba(255,255,235,.4);margin-bottom:.5rem}
    .cert-name{font-family:'EB Garamond',Georgia,serif;font-size:clamp(2.4rem,6vw,3.6rem);font-weight:500;color:var(--lumen);letter-spacing:-.02em;line-height:1.1;margin-bottom:.5rem}
    .cert-sub{font-size:.85rem;color:rgba(255,255,235,.38);margin-bottom:2rem}
    .cert-course-label{font-size:.78rem;color:rgba(255,255,235,.35);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.6rem}
    .cert-course{font-family:'EB Garamond',Georgia,serif;font-size:1.7rem;font-weight:500;font-style:italic;color:var(--lumen);margin-bottom:2.5rem;line-height:1.2}

    .cert-divider{width:80px;height:1px;background:linear-gradient(90deg,transparent,rgba(3,79,70,.7),transparent);margin:0 auto 2.5rem}

    .cert-footer{display:flex;align-items:flex-end;justify-content:space-between;gap:2rem;flex-wrap:wrap}
    .cert-sig{text-align:left}
    .cert-sig-name{font-family:'EB Garamond',Georgia,serif;font-size:1.3rem;font-weight:500;font-style:italic;color:rgba(255,255,235,.8);border-bottom:1px solid rgba(255,255,235,.15);padding-bottom:.35rem;margin-bottom:.4rem}
    .cert-sig-role{font-size:.72rem;color:rgba(255,255,235,.3);text-transform:uppercase;letter-spacing:.07em}
    .cert-seal{width:72px;height:72px;border-radius:50%;background:rgba(3,79,70,.2);border:2px solid rgba(3,79,70,.5);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.1rem;flex-shrink:0}
    .cert-seal-text{font-size:.45rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(3,79,70,.9)}
    .cert-meta{text-align:right}
    .cert-meta-row{font-size:.72rem;color:rgba(255,255,235,.3);margin-bottom:.25rem}
    .cert-meta-row strong{color:rgba(255,255,235,.55)}

    @media(max-width:600px){.cert{padding:2.5rem 2rem}.cert-footer{flex-direction:column;align-items:center;text-align:center}.cert-sig{text-align:center}.cert-meta{text-align:center}}

    /* PRINT */
    @media print{
      body{background:#fff !important}
      body::after{display:none}
      nav,.nav-actions{display:none !important}
      .page{padding:0}
      .cert-wrap{max-width:100%}
      .cert{background:#fff !important;border-color:#034f46 !important;box-shadow:none !important;border-radius:0;color:#0a0a08 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
      .cert::before{border-color:rgba(3,79,70,.3) !important}
      .cert-logo,.cert-name,.cert-course{color:#0a0a08 !important}
      .cert-eyebrow,.cert-course-label{color:#034f46 !important}
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">AIQ</a>
    <div class="nav-actions">
      <a href="javascript:history.back()" class="btn-back">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/></svg>
        Back to course
      </a>
      <button class="btn-download" onclick="window.print()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/></svg>
        Download / Print
      </button>
    </div>
  </nav>

  <div class="page">
    <div class="cert-wrap">
      <div class="cert" id="cert">
        <div class="cert-glow"></div>

        <!-- Corner ornaments -->
        <div class="cert-corner tl"><svg viewBox="0 0 60 60" fill="none"><path d="M4 4 L4 28 M4 4 L28 4 M4 4 Q4 4 12 12" stroke="#5ecfbb" stroke-width="1.5" stroke-linecap="round"/></svg></div>
        <div class="cert-corner tr"><svg viewBox="0 0 60 60" fill="none"><path d="M4 4 L4 28 M4 4 L28 4 M4 4 Q4 4 12 12" stroke="#5ecfbb" stroke-width="1.5" stroke-linecap="round"/></svg></div>
        <div class="cert-corner bl"><svg viewBox="0 0 60 60" fill="none"><path d="M4 4 L4 28 M4 4 L28 4 M4 4 Q4 4 12 12" stroke="#5ecfbb" stroke-width="1.5" stroke-linecap="round"/></svg></div>
        <div class="cert-corner br"><svg viewBox="0 0 60 60" fill="none"><path d="M4 4 L4 28 M4 4 L28 4 M4 4 Q4 4 12 12" stroke="#5ecfbb" stroke-width="1.5" stroke-linecap="round"/></svg></div>

        <div class="cert-eyebrow">Certificate of Completion</div>
        <div class="cert-logo">AIQ</div>
        <div class="cert-presents">presents this certificate to</div>

        <div class="cert-name" id="cert-name">—</div>
        <div class="cert-sub">for successfully completing</div>
        <div class="cert-course-label">Course</div>
        <div class="cert-course" id="cert-course">—</div>

        <div class="cert-divider"></div>

        <div class="cert-footer">
          <div class="cert-sig">
            <div class="cert-sig-name">Michael Neftali</div>
            <div class="cert-sig-role">Founder, AIQ Courses</div>
          </div>
          <div class="cert-seal">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="rgba(3,79,70,0.9)"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
          </div>
          <div class="cert-meta">
            <div class="cert-meta-row">Issued: <strong id="cert-date">—</strong></div>
            <div class="cert-meta-row">Cert ID: <strong id="cert-id">—</strong></div>
            <div class="cert-meta-row">aiq-courses.com</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const params   = new URLSearchParams(window.location.search);
    const courseId = params.get('course') || '';
    const rawName  = params.get('name')   || 'Student';
    const rawDate  = params.get('date')   || new Date().toISOString().split('T')[0];
    const certId   = params.get('cert')   || 'AIQ-000000';

    const COURSE_NAMES = {
      video:   'Create Videos Using AI',
      books:   'Write Books Using AI',
      music:   'Create Songs Using AI',
      motion:  'Create Motion Graphics Using AI',
      games:   'Create Games Using AI',
      animate: 'Animate Images Using AI',
      web:     'Create Websites Using AI',
    };

    document.getElementById('cert-name').textContent   = decodeURIComponent(rawName);
    document.getElementById('cert-course').textContent = COURSE_NAMES[courseId] || decodeURIComponent(courseId);
    document.getElementById('cert-id').textContent     = certId;

    const d = new Date(rawDate);
    document.getElementById('cert-date').textContent = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
    document.title = 'Certificate — ' + (COURSE_NAMES[courseId] || courseId) + ' — AIQ';
  </script>
</body>
</html>
